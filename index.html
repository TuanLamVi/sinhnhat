<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GỬI THIỆP ONLINE</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/TuanLamVi/invite/main/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/TuanLamVi/invite/main/favicon.png">

    <meta property="og:title" content="THIỆP MỜI ONLINE">
    <meta property="og:description" content="Gửi thiệp online giúp bạn tạo thiệp nhanh chóng, đẹp mắt.">
    <meta property="og:image" content="https://raw.githubusercontent.com/TuanLamVi/sendinvite/main/logo.jpg">
    <meta property="og:url" content="https://tuanlamvi.github.io/invite/">
   
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&family=Caveat&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
   
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --pink1: #ff9a9e;
            --pink3: #fbc2eb;
            --main-red: #e91e63;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, var(--pink1), var(--pink3));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 22px;
            padding: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        canvas {
            width: 100%;
            display: block;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .external-input {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            border: 2px dashed var(--main-red);
            background: #fff5f7;
            text-align: center;
            font-size: 15px;
            color: var(--main-red);
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        /* LỚP NỀN TRONG SUỐT HOÀN TOÀN */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; /* Đã sửa thành trong suốt */
            display: none;
            z-index: 9998;
        }
        .overlay.active {
            display: block;
        }

        .popup {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15); /* Giảm độ đậm bóng để hài hòa với nền trong suốt */
            z-index: 9999;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f8c4d0;
        }
        .popup.active {
            bottom: 20px;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .popup-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--main-red);
        }
        .close-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: #f0f0f0;
            color: #666;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section {
            margin-bottom: 12px;
            width: 100%;
        }
        .section-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--main-red);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%; 
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid #f8c4d0;
            font-size: 14px;
            outline: none;
        }

        .size-slider {
            background: #fdf2f4;
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .size-slider input {
            flex: 1;
            accent-color: var(--main-red);
        }

        .palette {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }
        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 18px;
        }
        .btn {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-download { background: linear-gradient(135deg, #ff758c, #ff7eb3); }
        .btn-share { background: linear-gradient(135deg, #36d1dc, #5b86e5); }

        .contact-footer {
            margin-top: 20px;
            padding: 15px;
            background: #fffafa;
            border-radius: 18px;
            border: 1px solid #ffcad4;
            text-align: center;
        }
        .contact-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .contact-btn {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 10px 5px;
            text-decoration: none;
            color: var(--main-red);
            border: 1px solid #f8c4d0;
            font-size: 11px;
        }
        .contact-btn strong { display: block; font-size: 13px; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="hidePopup()"></div>

    <div class="container">
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
        
        <input type="text" readonly class="external-input" 
               placeholder="✨ Bấm để ghi tên khách mời..." 
               onclick="showPopup()">

        <div class="popup" id="popup">
            <div class="popup-header">
                <div class="popup-title">✏️ Chỉnh sửa thiệp</div>
                <button class="close-btn" onclick="hidePopup()">×</button>
            </div>
            
            <div class="section">
                <label class="section-label">Tên khách mời</label>
                <input type="text" id="text" placeholder="Ví dụ: Anh Tuấn & Chị Lan">
            </div>
            
            <div class="section">
                <label class="section-label">Kiểu chữ</label>
                <select id="font">
                    <option value="'Great Vibes'">Great Vibes</option>
                    <option value="'Dancing Script'">Dancing Script</option>
                    <option value="'Caveat'">Caveat</option>
                    <option value="'Be Vietnam Pro'">Be Vietnam Pro</option>
                </select>
            </div>
            
            <div class="section">
                <label class="section-label">Kích thước: <span id="size-value">120</span></label>
                <div class="size-slider">
                    <input type="range" id="size" min="40" max="250" value="120">
                </div>
            </div>
            
            <div class="section">
                <label class="section-label">Màu chữ</label>
                <div class="palette" id="palette"></div>
            </div>
            
            <div class="action-group">
                <button class="btn btn-download" onclick="save()">📥 TẢI VỀ</button>
                <button class="btn btn-share" onclick="share()">📤 GỬI NGAY</button>
            </div>
        </div>

        <div class="contact-footer">
            <div style="font-weight: 700; color: var(--main-red); font-size: 13px;">❤️ LIÊN HỆ HỖ TRỢ</div>
            <div class="contact-row">
                <a href="tel:0984062140" class="contact-btn">📱 Hotline<strong>0984 062 140</strong></a>
                <a href="https://zalo.me/0984062140" target="_blank" class="contact-btn">💬 Zalo<strong>0984 062 140</strong></a>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            imageUrl: "https://raw.githubusercontent.com/TuanLamVi/sinhnhat/main/hopdonghuong.png",
            textX: 0.75,           
            textY: 0.33,         
            textAlign: "center",  
            shadowColor: "rgba(0,0,0,0.3)",
            shadowBlur: 8
        };

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const popup = document.getElementById("popup");
        const overlay = document.getElementById("overlay");
        const textInput = document.getElementById("text");
        const sizeSlider = document.getElementById("size");
        const sizeValue = document.getElementById("size-value");
        const fontSelect = document.getElementById("font");
        let color = "#000000";

        let img = new Image();
        img.crossOrigin = "anonymous";
        img.src = CONFIG.imageUrl;
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            draw();
        };

        const colors = ["#000000", "#e91e63", "#9c27b0", "#3f51b5", "#ff5722", "#ffffff"];
        const palette = document.getElementById("palette");
        colors.forEach(c => {
            let d = document.createElement("div");
            d.className = "color-dot";
            d.style.background = c;
            d.onclick = () => { color = c; draw(); };
            palette.appendChild(d);
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            const text = textInput.value.trim();
            if (text) {
                const fontSize = parseFloat(sizeSlider.value);
                ctx.fillStyle = color;
                ctx.font = `${fontSize}px ${fontSelect.value}`;
                ctx.textAlign = CONFIG.textAlign;
                ctx.textBaseline = "bottom";
                ctx.shadowColor = CONFIG.shadowColor;
                ctx.shadowBlur = CONFIG.shadowBlur;
                ctx.fillText(text, canvas.width * CONFIG.textX, canvas.height * CONFIG.textY);
                ctx.shadowBlur = 0;
            }
        }

        sizeSlider.oninput = () => { sizeValue.textContent = sizeSlider.value; draw(); };
        textInput.oninput = draw;
        fontSelect.onchange = draw;

        function showPopup() {
            popup.classList.add("active");
            overlay.classList.add("active");
            textInput.focus();
        }

        function hidePopup() {
            popup.classList.remove("active");
            overlay.classList.remove("active");
        }

        function save() {
            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = "thiep_moi.png";
            a.click();
        }

        async function share() {
            if (!navigator.share) return alert("Trình duyệt không hỗ trợ");
            try {
                const blob = await (await fetch(canvas.toDataURL("image/png"))).blob();
                const file = new File([blob], "thiep.png", { type: "image/png" });
                await navigator.share({ files: [file] });
            } catch (e) {}
        }
    </script>
</body>
</html>
