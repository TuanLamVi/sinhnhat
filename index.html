<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GỬI THIỆP ONLINE</title>
    <meta property="og:title" content="THIỆP MỜI ONLINE">
    <meta property="og:description" content="Gửi thiệp online giúp bạn tạo thiệp nhanh chóng, đẹp mắt chỉ trong một nốt nhạc. Tùy chỉnh font chữ, màu sắc và tải về hoặc gửi trực tiếp ngay trên điện thoại.">
    <meta property="og:image" content="https://raw.githubusercontent.com/TuanLamVi/sendinvite/main/logo.jpg">
    <meta property="og:url" content="https://tuanlamvi.github.io/invite/">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&family=Caveat&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink1: #ff9a9e;
            --pink3: #fbc2eb;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, var(--pink1), var(--pink3));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 22px;
            padding: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .canvas-wrapper {
            position: relative;
        }
        canvas {
            width: 100%;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .popup {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 10px 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            display: none;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .popup.active {
            bottom: 62px;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .popup-title {
            font-size: 14.5px;
            font-weight: 600;
            color: #e91e63;
        }
        .close-btn {
            width: 34px;
            height: 34px;
            border: none;
            background: #ff1744;
            color: white;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(255,23,68,0.3);
        }

        .section {
            margin-bottom: 7px;
        }
        .section-label {
            font-size: 11.5px;
            font-weight: 600;
            color: #e91e63;
            margin-bottom: 3px;
        }

        input, select {
            width: 100%;
            padding: 9px 11px;
            border-radius: 11px;
            border: 2px solid #f8c4d0;
            font-size: 14.8px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #e91e63;
        }

        .size-slider {
            background: rgba(248,248,248,0.9);
            padding: 7px 11px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .size-slider input[type="range"] {
            flex: 1;
            accent-color: #e91e63;
        }
        #size-value {
            font-weight: 700;
            font-size: 15.5px;
            min-width: 36px;
            text-align: center;
            color: #e91e63;
        }

        .palette {
            display: flex;
            justify-content: space-around;
            margin: 5px 0 3px 0;
        }
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
            margin-top: 10px;
        }
        button {
            padding: 11px;
            border-radius: 11px;
            border: none;
            font-weight: 600;
            font-size: 14.5px;
            cursor: pointer;
        }
        .btn-download {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
        }
        .btn-share {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canvas-wrapper" id="wrapper">
            <canvas id="canvas"></canvas>
            
            <div class="popup" id="popup">
                <div class="popup-header">
                    <div class="popup-title">✏️ Chỉnh sửa thiệp</div>
                    <button class="close-btn" onclick="hidePopup()">×</button>
                </div>
                
                <div class="section">
                    <label class="section-label">NỘI DUNG</label>
                    <input type="text" id="text" placeholder="Nhập tên khách mời...">
                </div>
                
                <div class="section">
                    <label class="section-label">KIỂU CHỮ</label>
                    <select id="font">
                        <option value="'Great Vibes'">Great Vibes - Sang trọng</option>
                        <option value="'Dancing Script'">Dancing Script</option>
                        <option value="'Caveat'">Caveat - Viết tay</option>
                        <option value="'Be Vietnam Pro'">Be Vietnam Pro</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>
                
                <div class="section">
                    <label class="section-label">KÍCH THƯỚC CHỮ</label>
                    <div class="size-slider">
                        <input type="range" id="size" min="40" max="280" value="120" step="2">
                        <span id="size-value">120</span>
                    </div>
                </div>
                
                <div class="section">
                    <label class="section-label">MÀU CHỮ</label>
                    <div class="palette" id="palette"></div>
                </div>
                
                <div class="action-group">
                    <button class="btn-download" onclick="save()">📥 TẢI VỀ</button>
                    <button class="btn-share" onclick="share()">📤 GỬI</button>
                </div>
            </div>
        </div>
        
        <input type="text" placeholder="Bấm vào đây để chỉnh nội dung thiệp..." 
               onclick="showPopup()" style="margin-top:12px; text-align:center; font-size:15px;">
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const popup = document.getElementById("popup");
        const wrapper = document.getElementById("wrapper");
        const textInput = document.getElementById("text");
        const sizeSlider = document.getElementById("size");
        const sizeValue = document.getElementById("size-value");
        const fontSelect = document.getElementById("font");

        let color = "#000";

        const CONFIG = {
            imageUrl: "https://raw.githubusercontent.com/TuanLamVi/sinhnhat/main/thiepmau4.png",
            fixedBottomY: 0.152   // Vị trí cố định phần dưới chữ (càng lớn càng xuống dưới)
        };

        let img = new Image();
        img.crossOrigin = "anonymous";
        img.src = CONFIG.imageUrl;

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            draw();
        };

        const colors = ["#000000", "#e91e63", "#9c27b0", "#3f51b5", "#d81b60", "#ff5722", "#ffffff"];
        const palette = document.getElementById("palette");
        colors.forEach(c => {
            let d = document.createElement("div");
            d.className = "color-dot";
            d.style.background = c;
            d.onclick = () => { color = c; draw(); };
            palette.appendChild(d);
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            const text = textInput.value.trim();
            if (text) {
                const fontSize = parseFloat(sizeSlider.value);
                
                ctx.fillStyle = color;
                ctx.font = `${fontSize}px ${fontSelect.value}`;
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";     // Quan trọng: Cố định phần dưới

                // Vị trí Y cố định phần dưới chữ
                const textY = canvas.height * CONFIG.fixedBottomY;

                ctx.shadowColor = "rgba(0,0,0,0.45)";
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 3;
                
                ctx.fillText(text, canvas.width * 0.5, textY);
                
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }
        }

        sizeSlider.addEventListener("input", () => {
            sizeValue.textContent = sizeSlider.value;
            draw();
        });
        textInput.addEventListener("input", draw);
        fontSelect.addEventListener("change", draw);

        function showPopup() {
            popup.style.display = "block";
            setTimeout(() => popup.classList.add("active"), 10);
            textInput.focus();
        }

        function hidePopup() {
            popup.style.display = "none";
            popup.classList.remove("active");
        }

        wrapper.addEventListener("click", (e) => {
            if (e.target === wrapper) hidePopup();
        });

        function save() {
            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = "thiep_moi.png";
            a.click();
        }

        async function share() {
            if (!navigator.share) return alert("Trình duyệt không hỗ trợ chia sẻ");
            try {
                const blob = await (await fetch(canvas.toDataURL("image/png"))).blob();
                const file = new File([blob], "thiep_moi.png", { type: "image/png" });
                await navigator.share({ files: [file] });
            } catch (e) {}
        }
    </script>
</body>
</html>
